name: CI Jeux VideoPS

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

jobs:
  ci-spaceinvaders:
    name: CI - Space Invaders
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./jeux/SpaceInvaders
    steps:
      - name: Récupération du code source
        uses: actions/checkout@v4

      - name: Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installation des dépendances
        run: npm install

      - name: Linter (ESLint)
        run: npm run lint

      - name: Exécution des tests unitaires et fonctionnels (Jest)
        run: npm test

      - name: Audit de sécurité
        run: npm audit --audit-level=none

      - name: Résumé du pipeline
        if: always()
        run: |
          echo "## CI - Space Invaders" >> $GITHUB_STEP_SUMMARY
          echo "Pipeline validé avec succès !" >> $GITHUB_STEP_SUMMARY

  ci-twoships:
    name: CI - Two Ships
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./jeux/TwoShips
    steps:
      - name: Récupération du code source
        uses: actions/checkout@v4

      - name: Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installation des dépendances
        run: npm install

      - name: Linter
        run: npm run lint

      - name: Tests unitaires (Jest)
        run: npm test

      - name: Build du jeu
        run: npm run build

      - name: Lancer le serveur et tester
        run: npx start-server-and-test serve http://localhost:5000/JeuxVideoOps/TwoShips/ test:e2e

      - name: Audit de sécurité
        run: npm audit --audit-level=none

      - name: Annotations des résultats
        if: always()
        run: |
          echo "::notice::✅ Linter OK"
          echo "::notice::✅ Tests unitaires OK - 11 tests passés"
          echo "::notice::✅ Tests fonctionnels OK - 3 tests Cypress passés"

      - name: Résumé du pipeline
        if: always()
        run: |
          echo "## 🎮 CI - TwoShips" >> $GITHUB_STEP_SUMMARY
          echo "| Étape | Statut |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Linter | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests unitaires | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests fonctionnels | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Audit sécurité | ✅ |" >> $GITHUB_STEP_SUMMARY

  deploy:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [ci-twoships, ci-spaceinvaders]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Récupération du code source
        uses: actions/checkout@v4

      - name: Connexion à GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build et Push de l'image Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/frago1110/jeuxvideops:latest

  pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [ci-twoships, ci-spaceinvaders]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Récupération du code source
        uses: actions/checkout@v4

      - name: Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build TwoShips
        working-directory: ./jeux/TwoShips
        run: npm install && npm run build

      - name: Build SpaceInvaders
        working-directory: ./jeux/SpaceInvaders
        run: npm install && npm run build

      - name: Préparer les fichiers pour GitHub Pages
        run: |
          mkdir -p public
          cp -r app-web/. public/
          cp -r jeux/TwoShips/dist/. public/TwoShips/
          cp -r jeux/SpaceInvaders/build/. public/SpaceInvaders/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4  