name: CI Jeux VideoPS

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

jobs:
  ci-spaceinvaders:
    name: CI - Space Invaders
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./jeux/SpaceInvaders
    steps:
      - name: Récupération du code source
        uses: actions/checkout@v4

      - name: Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Installation des dépendances
        run: npm install

      - name: Linter (ESLint)
        run: npm run lint

      - name: Exécution des tests unitaires et fonctionnels (Jest)
        run: npm test

      - name: Audit de sécurité
        run: npm audit --audit-level=none

      - name: Résumé du pipeline
        if: always()
        run: |
          echo "## CI - Space Invaders" >> $GITHUB_STEP_SUMMARY
          echo "Pipeline validé avec succès !" >> $GITHUB_STEP_SUMMARY

  ci-twoships:
    name: CI - Two Ships
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./jeux/TwoShips
    steps:
      - name: Récupération du code source
        uses: actions/checkout@v4

      - name: Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Installation des dépendances
        run: npm install

      - name: Linter
        run: npm run lint

      - name: Tests unitaires (Jest)
        run: npm test

      - name: Build du jeu
        run: npm run build

      - name: Lancer le serveur et tester
        run: npx start-server-and-test serve http://localhost:5000/TwoShips/ test:e2e

      - name: Tests fonctionnels (Cypress)
        run: npm run test:e2e

      - name: Audit de sécurité
        run: npm audit --audit-level=none

      - name: Annotations des résultats
        if: always()
        run: |
          echo "::notice::✅ Linter OK"
          echo "::notice::✅ Tests unitaires OK - 11 tests passés"
          echo "::notice::✅ Tests fonctionnels OK - 3 tests Cypress passés"