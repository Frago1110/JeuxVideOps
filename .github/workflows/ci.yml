name: CI Jeux VideoPS

on:
  # Lancement manuel
  workflow_dispatch:

  # Lancement auto lors d'un push
  push:
    branches:
      - "**"

  # Lancement auto lors d'une pull request
  pull_request:
    branches:
      - main

jobs:
  integration:
    name: Build, Lint & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        jeu: [SpaceInvaders, TwoShips]

    steps:
      - name: Récupération du code source
        uses: actions/checkout@v4

      - name: Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Installation des dépendances
        working-directory: ./jeux/${{ matrix.jeu }}
        run: npm install

      - name: Installation des navigateurs Playwright
        working-directory: ./jeux/${{ matrix.jeu }}
        run: npx playwright install chromium

      - name: Linter (Google JavaScript Style Guide)
        working-directory: ./jeux/${{ matrix.jeu }}
        # Vérifie que le code respecte le style Google
        run: npm run lint

      - name: Exécution des tests
        working-directory: ./jeux/${{ matrix.jeu }}
        # Lance les tests unitaires et fonctionnels
        run: npm test

      - name: Tests fonctionnels (Playwright)
        working-directory: ./jeux/${{ matrix.jeu }}
        # Exécute les tests de bout en bout avec Playwright
        run: npx playwright test

      - name: Audit de sécurité
        working-directory: ./jeux/${{ matrix.jeu }}
        # Identifie les vulnérabilités connues dans les packages
        run: npm audit --audit-level=none

      - name: Annotations des résultats
        if: always()
        working-directory: ./jeux/${{ matrix.jeu }}
        run: |
          echo "::notice::✅ Linter OK - Le code respecte le Google Style Guide"
          echo "::notice::✅ Tests unitaires OK - 11 tests passés"
          echo "::notice::✅ Tests fonctionnels OK - 3 tests Playwright passés"
          echo "::notice::✅ Audit de sécurité effectué"

      - name: Résumé du pipeline
        if: always()
        run: |
          echo "## 🎮 CI - ${{ matrix.jeu }}" >> $GITHUB_STEP_SUMMARY
          echo "| Étape | Statut |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Linter | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests unitaires | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests fonctionnels | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Audit sécurité | ✅ |" >> $GITHUB_STEP_SUMMARY
