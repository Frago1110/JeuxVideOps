name: CI Jeux VideoPS

on:
  # Lancement manuel
  workflow_dispatch:

  # Lancement auto lors d'un push
  push:
    branches:
      - "**"

  # Lancement auto lors d'une pull request
  pull_request:
    branches:
      - main

jobs:
  ci-spaceinvaders:
    name: CI - Space Invaders
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./jeux/SpaceInvaders

    steps:
      - name: Récupération du code source
        uses: actions/checkout@v4

      - name: Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Installation des dépendances
        run: npm install

      - name: Linter (ESLint)
        run: npm run lint

      - name: Exécution des tests unitaires et fonctionnels (Jest)
        run: npm test

      - name: Audit de sécurité
        run: npm audit --audit-level=none

      - name: Résumé du pipeline
        if: always()
        run: |
          echo "## CI - Space Invaders" >> $GITHUB_STEP_SUMMARY
          echo "Pipeline validé avec succès !" >> $GITHUB_STEP_SUMMARY

  ci-twoships:
    name: CI - Two Ships
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./jeux/TwoShips

    steps:
      - name: Récupération du code source
        uses: actions/checkout@v4

      - name: Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Installation des dépendances
        run: npm install

      - name: Installation des navigateurs Playwright
        run: npx playwright install chromium

      - name: Linter
        run: npm run lint

      - name: Tests fonctionnels (Playwright)
        run: npx playwright test

      - name: Audit de sécurité
        run: npm audit --audit-level=none

      - name: Résumé du pipeline
        if: always()
        run: |
          echo "## CI - Two Ships" >> $GITHUB_STEP_SUMMARY
          echo "Pipeline validé avec succès !" >> $GITHUB_STEP_SUMMARY
