name: CI Jeux VideoPS

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

jobs:
  ci-spaceinvaders:
    name: CI - Space Invaders
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./jeux/SpaceInvaders
    steps:
      - name: Récupération du code source
        uses: actions/checkout@v4

      - name: Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installation des dépendances
        id: install
        run: npm install

      - name: Linter (ESLint)
        id: lint
        run: npm run lint

      - name: Exécution des tests unitaires et fonctionnels (Jest)
        id: test
        run: npm test

      - name: Audit de sécurité
        id: audit
        run: npm audit --audit-level=none

      - name: Annotations et Résumé du pipeline
        if: always()
        run: |
          # Annotations dynamiques
          [[ "${{ steps.lint.outcome }}" == 'success' ]] && echo "::notice::Space Invaders - Linter : Succes" || echo "::error::Space Invaders - Linter : Echec"
          [[ "${{ steps.test.outcome }}" == 'success' ]] && echo "::notice::Space Invaders - Tests unitaires : Succes" || echo "::error::Space Invaders - Tests unitaires : Echec"
          [[ "${{ steps.test.outcome }}" == 'success' ]] && echo "::notice::Space Invaders - Tests fonctionnels : Succes" || echo "::error::Space Invaders - Tests fonctionnels : Echec"
          [[ "${{ steps.audit.outcome }}" == 'success' ]] && echo "::notice::Space Invaders - Audit de securite : Succes" || echo "::warning::Space Invaders - Audit de securite : Vulnerabilites detectees"

          # Résumé Markdown
          echo "## CI - Space Invaders" >> $GITHUB_STEP_SUMMARY
          echo "| Etape | Statut |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Linter | ${{ steps.lint.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests unitaires | ${{ steps.test.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests fonctionnels | ${{ steps.test.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Audit securite | ${{ steps.audit.outcome }} |" >> $GITHUB_STEP_SUMMARY

  ci-twoships:
    name: CI - Two Ships
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./jeux/TwoShips
    steps:
      - name: Récupération du code source
        uses: actions/checkout@v4

      - name: Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installation des dépendances
        id: install
        run: npm install

      - name: Linter
        id: lint
        run: npm run lint

      - name: Tests unitaires (Jest)
        id: test_unit
        run: npm test

      - name: Build du jeu
        id: build
        run: npm run build

      - name: Lancer le serveur et tester
<<<<<<< HEAD
        id: test_e2e
        run: npx start-server-and-test serve http://localhost:5000/JeuxVideoOps/TwoShips/ test:e2e
=======
        run: npx start-server-and-test serve http://localhost:5000/JeuxVideOps/TwoShips/ test:e2e
>>>>>>> 298c639 (fix: correct base URL case for GitHub Pages (JeuxVideOps))

      - name: Audit de sécurité
        id: audit
        run: npm audit --audit-level=none

      - name: Annotations et Résumé du pipeline
        if: always()
        run: |
          # Annotations dynamiques
          [[ "${{ steps.lint.outcome }}" == 'success' ]] && echo "::notice::Two Ships - Linter : Succes" || echo "::error::Two Ships - Linter : Echec"
          [[ "${{ steps.test_unit.outcome }}" == 'success' ]] && echo "::notice::Two Ships - Tests unitaires : Succes" || echo "::error::Two Ships - Tests unitaires : Echec"
          [[ "${{ steps.test_e2e.outcome }}" == 'success' ]] && echo "::notice::Two Ships - Tests fonctionnels : Succes" || echo "::error::Two Ships - Tests fonctionnels : Echec"
          [[ "${{ steps.audit.outcome }}" == 'success' ]] && echo "::notice::Two Ships - Audit de securite : Succes" || echo "::warning::Two Ships - Audit de securite : Vulnerabilites detectees"

          # Résumé Markdown
          echo "## CI - TwoShips" >> $GITHUB_STEP_SUMMARY
          echo "| Etape | Statut |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Linter | ${{ steps.lint.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests unitaires | ${{ steps.test_unit.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests fonctionnels | ${{ steps.test_e2e.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Audit securite | ${{ steps.audit.outcome }} |" >> $GITHUB_STEP_SUMMARY

  deploy:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [ci-twoships, ci-spaceinvaders]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Récupération du code source
        uses: actions/checkout@v4

      - name: Connexion à GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build et Push de l'image Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/frago1110/jeuxvideops:latest

  pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [ci-twoships, ci-spaceinvaders]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Récupération du code source
        uses: actions/checkout@v4

      - name: Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build TwoShips
        working-directory: ./jeux/TwoShips
        run: npm install && npm run build

      - name: Build SpaceInvaders
        working-directory: ./jeux/SpaceInvaders
        run: npm install && npm run build

      - name: Préparer les fichiers pour GitHub Pages
        run: |
          mkdir -p public
          cp -r app-web/. public/
          cp -r jeux/TwoShips/dist/. public/TwoShips/
          cp -r jeux/SpaceInvaders/build/. public/SpaceInvaders/
          touch public/.nojekyll

      - name: Debug - vérifier les fichiers
        run: |
          echo "=== Contenu de public/ ==="
          ls -la public/
          echo "=== Contenu de public/TwoShips/ ==="
          ls -la public/TwoShips/
          echo "=== Contenu de public/TwoShips/assets/ ==="
          ls -la public/TwoShips/assets/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
